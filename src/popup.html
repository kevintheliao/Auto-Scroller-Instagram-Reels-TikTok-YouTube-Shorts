<html lang="en">

<head>
    <title>Auto Scroller — Reels, TikTok & Shorts</title>
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>

<body>
    <div id="popupRoot">

        <div class="card">
            <h3 class="card-title">Auto Scroller</h3>
            <p class="card-subtitle">Instagram Reels · TikTok · YouTube Shorts</p>

            <label class="switch">
                <input type="checkbox" id="enabled" />
                <span class="slider round"></span>
            </label>
        </div>

        <div class="card">
            <h2 class="card-title">Keyboard shortcuts</h2>

            <ul class="shortcut-list">
                <li>
                    <span class="label">Toggle Auto Scroll</span>
                    <kbd>R</kbd>
                </li>
                <li>
                    <span class="label">Like</span>
                    <kbd>F</kbd>
                </li>
                <li>
                    <span class="label">Open Comments</span>
                    <kbd>C</kbd>
                </li>
                <li>
                    <span class="label">Mute/Unmute</span>
                    <kbd>M</kbd>
                </li>
            </ul>
            <p class="shortcut-note">On YouTube Shorts: <kbd>R</kbd> toggles auto scroll, <kbd>E</kbd> likes — YouTube's own F/C/M shortcuts stay active.</p>
        </div>

    </div>

    <div class="footer-row">
        <div class="feedback">
            Feedback? Click <a
                href="https://docs.google.com/forms/d/e/1FAIpQLScElo0xb6CCIPFu_AEp6t06LsUS3XDrpa6zshlIq8RTuCq-Fw/viewform?usp=publish-editor"
                target="_blank" rel="noopener noreferrer">here.</a>
        </div>
        <div class="version number">
            v2.1.3
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
